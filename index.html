<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Trade Analyzer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./config.js"></script>
  <link rel="stylesheet" href="./styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Press+Start+2P&display=swap');

    :root {
      /* Stealth Wealth — Obsidian Black palette */
      --bg:            #080a0a;
      --surface:       rgba(12, 14, 14, 0.82);
      --surface-raised: rgba(16, 19, 19, 0.90);
      --line:          rgba(255, 255, 255, 0.07);
      --line-accent:   rgba(67, 255, 159, 0.22);
      --text:          #e8ede9;
      --text-secondary: #6b7c72;
      --neon:          #3dffa0;
      --neon-soft:     rgba(61, 255, 160, 0.12);
      --neon-glow:     rgba(61, 255, 160, 0.06);
      --danger:        #ff4d6a;
      --ok:            #2ecc71;
      --radius-card:   18px;
      --radius-input:  12px;
      --radius-btn:    10px;
      --transition:    all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    /* Matrix � ������ ���� �����, ��� ������� */
    #matrix {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      opacity: 0.45;
      pointer-events: none;
    }
    .app > .head,
    .app > .menu-grid {
      position: relative;
      z-index: 1;
    }

    .screen {
      position: relative;
      z-index: 1;
      height: 100dvh;
      height: 100vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      transition: filter .35s ease, opacity .35s ease;
    }

    .screen.blurred {
      filter: blur(10px) brightness(0.4);
      opacity: .6;
      pointer-events: none;
    }

    /* Main card — Obsidian Black */
    .app {
      width: min(720px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 64px rgba(0, 0, 0, 0.72),
        0 4px 16px rgba(0, 0, 0, 0.5);
      padding: 22px 20px;
    }

    .head {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-shadow: none;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--line);
      border-radius: var(--radius-btn);
      padding: 4px;
    }

    .tab-btn {
      border: none;
      color: var(--text-secondary);
      background: transparent;
      border-radius: 8px;
      height: 36px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: var(--transition);
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    .tab-btn.active {
      background: var(--surface-raised);
      color: var(--neon);
      border: 1px solid var(--line-accent);
      box-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }

    .panel {
      display: none;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: rgba(10, 12, 12, 0.6);
      backdrop-filter: blur(16px);
      padding: 18px;
    }
    .panel.active { display: block; animation: panelIn .24s ease; }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .segment {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 14px;
    }
    .segment-btn {
      border: 1px solid var(--line);
      border-radius: var(--radius-btn);
      height: 36px;
      background: rgba(0,0,0,0.25);
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: var(--transition);
    }
    .segment-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
    }
    .segment-btn.active {
      border-color: var(--line-accent);
      color: var(--neon);
      background: rgba(61, 255, 160, 0.06);
      box-shadow: inset 0 0 12px rgba(61,255,160,0.05);
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .ios-select {
      position: relative;
    }
    .ios-select-trigger {
      width: 100%;
      height: 44px;
      border-radius: 0;
      border: 1px solid rgba(61, 255, 160, 0.18);
      background: #000;
      color: var(--text);
      padding: 0 40px 0 14px;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }
    .ios-select-trigger::after {
      content: "";
      position: absolute;
      right: 15px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid var(--text-secondary);
      border-bottom: 1.5px solid var(--text-secondary);
      transform: translateY(-65%) rotate(45deg);
      transition: transform .22s ease;
      pointer-events: none;
    }
    .ios-select.open .ios-select-trigger {
      border-color: rgba(61, 255, 160, 0.5);
      background: #000;
      box-shadow: 0 0 0 1px rgba(61, 255, 160, 0.18);
    }
    .ios-select.open .ios-select-trigger::after {
      transform: translateY(-30%) rotate(-135deg);
    }
    .ios-select-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      background: #000;
      border: 1px solid rgba(61, 255, 160, 0.25);
      border-radius: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      max-height: 220px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      opacity: 0;
      transform: translateY(-4px) scale(0.99);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 100;
    }
    .ios-select.open .ios-select-menu {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .ios-option {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(61, 255, 160, 0.06);
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 12px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s ease;
    }
    .ios-option:last-child { border-bottom: 0; }
    .ios-option:hover {
      background: rgba(61, 255, 160, 0.08);
      color: var(--neon);
    }

    .upload-wrap {
      display: none;
      margin-top: 10px;
      animation: panelIn .22s ease;
    }

    .upload-btn {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-btn);
      height: 44px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      background: rgba(0,0,0,0.2);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .upload-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.06), transparent 70%);
      transform: translateX(-130%);
      animation: shimmer 3s linear infinite;
      pointer-events: none;
    }

    .upload-btn:hover {
      border-color: var(--line-accent);
      color: var(--text);
      background: rgba(61,255,160,0.04);
    }
    .upload-btn:active { transform: scale(0.99); }

    .action-wrap {
      display: none;
      margin-top: 10px;
      animation: panelIn .22s ease;
    }
    .action-btn {
      width: 100%;
      border: 1px solid var(--line-accent);
      border-radius: var(--radius-btn);
      height: 48px;
      color: var(--neon);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      background: rgba(61, 255, 160, 0.06);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .action-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(61,255,160,0.08), transparent 70%);
      transform: translateX(-130%);
      animation: shimmer 2.8s linear infinite;
      pointer-events: none;
    }
    .action-btn:hover {
      background: rgba(61, 255, 160, 0.10);
      border-color: rgba(61, 255, 160, 0.4);
      box-shadow: 0 0 20px rgba(61,255,160,0.08);
    }
    .action-btn:active { transform: scale(0.99); }

    @keyframes shimmer {
      to { transform: translateX(130%); }
    }

    input[type="file"] { display: none; }

    .status {
      margin-top: 12px;
      min-height: 20px;
      color: var(--text-secondary);
      font-family: 'Inter', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .result {
      margin-top: 14px;
      display: none;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: rgba(0, 0, 0, 0.45);
      padding: 18px;
    }
    .result.show { display: block; animation: panelIn .25s ease; }

    .signal {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .signal.up   { color: var(--ok);     text-shadow: 0 0 20px rgba(46, 204, 113, 0.25); }
    .signal.down { color: var(--danger); text-shadow: 0 0 20px rgba(255, 77, 106, 0.25); }

    .confidence {
      margin: 10px 0 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }
    .progress {
      margin: 8px 0 12px;
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(61,255,160,0.5), var(--neon));
      box-shadow: 0 0 8px rgba(61,255,160,0.3);
      transition: width .45s cubic-bezier(0.4,0,0.2,1);
    }
    .reasoning {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .metrics {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }
    .signal-card {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-input);
      padding: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.3);
    }
    .signal-badge {
      min-width: 140px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 8px;
      color: #fff;
    }
    .signal-badge.buy  { background: rgba(46, 204, 113, 0.15); border: 1px solid rgba(46,204,113,0.3); color: var(--ok); }
    .signal-badge.sell { background: rgba(255, 77, 106, 0.12); border: 1px solid rgba(255,77,106,0.3); color: var(--danger); }
    .signal-badge .icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      background: rgba(0,0,0,0.2);
    }

    .partner {
      margin-top: 14px;
      display: none;
      text-align: center;
    }
    .partner a {
      display: inline-block;
      text-decoration: none;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: var(--radius-btn);
      padding: 0 20px;
      line-height: 40px;
      border: 1px solid var(--line);
      background: transparent;
      transition: var(--transition);
    }
    .partner a:hover {
      border-color: var(--line-accent);
      color: var(--neon);
      background: rgba(61,255,160,0.04);
    }

    /* Profile */
    .profile-box {
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: rgba(0,0,0,0.3);
      padding: 16px;
      margin-bottom: 14px;
    }

    .nick {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .profile-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .profile-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line);
      object-fit: cover;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .profile-avatar.fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.04);
    }
    .meta {
      margin: 5px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    .history-title {
      margin: 0 0 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .history {
      max-height: 320px;
      overflow: auto;
      display: grid;
      gap: 6px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: var(--radius-input);
      background: rgba(0,0,0,0.25);
      padding: 10px 12px;
      font-size: 12px;
      transition: var(--transition);
    }
    .history-item:hover {
      border-color: rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.02);
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
      flex-shrink: 0;
    }
    .dot.down {
      background: var(--danger);
      box-shadow: 0 0 6px rgba(255, 77, 106, 0.5);
    }

    .empty {
      color: var(--text-secondary);
      font-size: 12px;
      padding: 8px 0;
    }

    /* ── SPLASH: Cyberpunk-style font ── */
    @font-face {
      font-family: 'Cyberpunk';
      src: url('./fonts/Cyberpunk_RUS_BY_LYAJKA.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    #splash.glitch-out {
      animation: splashExit 0.5s cubic-bezier(0.4,0,1,1) forwards;
    }
    @keyframes splashExit {
      0%   { opacity: 1; transform: none; clip-path: inset(0 0 0 0); }
      20%  { clip-path: inset(30% 0 20% 0); transform: translateX(6px); filter: hue-rotate(180deg); }
      40%  { clip-path: inset(60% 0 0% 0); transform: translateX(-4px); }
      60%  { clip-path: inset(0 0 70% 0); transform: scaleY(0.1); }
      80%  { opacity: 0.3; transform: scaleY(0.02) translateX(10px); }
      100% { opacity: 0; transform: scaleY(0); pointer-events: none; }
    }

    /* ── SPLASH TITLE — Cyberpunk Glitch ── */
    .splash-logo {
      position: relative;
      text-align: center;
    }

    .splash-title {
      font-family: 'Cyberpunk', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #f0f0f0;
      margin: 0 0 6px;
      white-space: nowrap;
      position: relative;
      text-shadow: none;
      animation: glitchIntro 1.5s ease-out forwards;
    }

    /* Red channel ghost */
    .splash-title::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff2a2a;
      left: -3px;
      clip-path: inset(0 0 60% 0);
      animation: glitchRed 1.5s ease-out forwards;
      pointer-events: none;
    }

    /* Cyan channel ghost */
    .splash-title::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #00e5ff;
      left: 3px;
      clip-path: inset(40% 0 0 0);
      animation: glitchCyan 1.5s ease-out forwards;
      pointer-events: none;
    }

    @keyframes glitchIntro {
      0%   { opacity: 0; transform: translateX(-20px) skewX(20deg); clip-path: inset(50% 0 50% 0); }
      5%   { opacity: 1; clip-path: inset(0 0 80% 0); transform: translateX(15px) skewX(-15deg); }
      10%  { clip-path: inset(70% 0 0 0);   transform: translateX(-12px) skewX(10deg); }
      15%  { clip-path: inset(20% 0 50% 0); transform: translateX(18px)  skewX(-20deg); }
      20%  { clip-path: inset(0 0 60% 0);   transform: translateX(-8px)  skewX(8deg); }
      25%  { clip-path: inset(55% 0 10% 0); transform: translateX(10px)  skewX(-6deg); }
      30%  { clip-path: inset(0 0 0 0);     transform: translateX(-15px) skewX(12deg); filter: hue-rotate(180deg); }
      35%  { clip-path: inset(40% 0 40% 0); transform: translateX(8px)   skewX(-8deg); filter: none; }
      40%  { clip-path: inset(0 0 70% 0);   transform: translateX(-6px)  skewX(5deg); }
      50%  { clip-path: inset(60% 0 0 0);   transform: translateX(5px)   skewX(-3deg); }
      60%  { clip-path: inset(0 0 30% 0);   transform: translateX(-3px)  skewX(2deg); }
      75%  { clip-path: inset(10% 0 10% 0); transform: translateX(2px)   skewX(-1deg); }
      88%  { clip-path: inset(2% 0 2% 0);   transform: translateX(-1px)  skewX(0.5deg); }
      100% { clip-path: inset(0 0 0 0);     transform: translateX(0)     skewX(0); opacity: 1; }
    }

    @keyframes glitchRed {
      0%   { opacity: 1; transform: translateX(-8px); clip-path: inset(0 0 70% 0); }
      10%  { transform: translateX(12px);  clip-path: inset(40% 0 0 0); }
      20%  { transform: translateX(-10px); clip-path: inset(0 0 50% 0); }
      35%  { transform: translateX(8px);   clip-path: inset(60% 0 20% 0); }
      50%  { transform: translateX(-5px);  clip-path: inset(10% 0 60% 0); }
      70%  { opacity: 0.5; transform: translateX(3px); }
      100% { opacity: 0; transform: translateX(0); }
    }

    @keyframes glitchCyan {
      0%   { opacity: 1; transform: translateX(8px);  clip-path: inset(50% 0 0 0); }
      10%  { transform: translateX(-12px); clip-path: inset(0 0 60% 0); }
      20%  { transform: translateX(10px);  clip-path: inset(60% 0 0 0); }
      35%  { transform: translateX(-8px);  clip-path: inset(0 0 40% 0); }
      50%  { transform: translateX(5px);   clip-path: inset(30% 0 30% 0); }
      70%  { opacity: 0.5; transform: translateX(-3px); }
      100% { opacity: 0; transform: translateX(0); }
    }

    .splash-bar-wrap {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .splash-bar-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 0;
      overflow: hidden;
    }
    .splash-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1a8c52, #3dffa0);
      box-shadow: 0 0 10px rgba(61,255,160,0.5);
      border-radius: 0;
      transition: width 0.12s linear;
    }
    .splash-pct {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #3dffa0;
      text-align: right;
    }

    /* ══════════════════════════════
       MAIN APP LAYOUT — карточка
    ══════════════════════════════ */

    .screen {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Карточка приложения — ФИКСИРОВАННЫЙ размер, острые углы, чёрная */
    .app {
      width: 380px;
      height: 640px;
      max-width: calc(100vw - 32px);
      max-height: calc(100dvh - 32px);
      max-height: calc(100vh - 32px);
      background: #000;
      border: 1px solid rgba(61, 255, 160, 0.35);
      border-radius: 0;
      box-shadow:
        0 0 24px rgba(61, 255, 160, 0.06),
        0 30px 70px rgba(0,0,0,0.7);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    /* Прямые дочерние элементы — поверх матрицы, но не side-panel (у него свой position) */
    .app > .head,
    .app > .menu-grid {
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .head {
      padding: 4px 4px 12px;
      border-bottom: 1px solid rgba(61, 255, 160, 0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .head-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .head-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3dffa0;
      box-shadow: 0 0 8px rgba(61,255,160,0.7);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(61,255,160,0.7); }
      50%       { opacity: 0.45; box-shadow: 0 0 4px rgba(61,255,160,0.3); }
    }
    .title {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e8ede9;
      white-space: nowrap;
    }
    .subtitle {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3b4a42;
    }

    /* MENU GRID — главный экран: только 3 квадрата */
    .menu-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tile {
      border: 1px solid rgba(61, 255, 160, 0.35);
      border-radius: 0;
      background: rgba(0, 0, 0, 0.9);
      position: relative;
      z-index: 3;
      cursor: pointer;      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tile:hover {
      border-color: rgba(61, 255, 160, 0.7);
      box-shadow: 0 0 20px rgba(61, 255, 160, 0.12), inset 0 0 30px rgba(61, 255, 160, 0.04);
    }
    .tile:active { transform: scale(0.99); }

    /* Большая верхняя кнопка "Получить AI сигнал" */
    .tile-main {
      flex: 2;
      min-height: 200px;
    }
    .tile-label-main {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #e8ede9;
      text-align: center;
      padding: 0 20px;
    }

    /* Нижний ряд: Профиль + История */
    .tiles-bottom {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .tile-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #e8ede9;
      text-align: center;
      line-height: 1.6;
    }

    /* SIGNAL BLOCK — теперь внутри overlay */
    .signal-block {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Market row */
    .market-row {
      display: flex;
      gap: 6px;
    }
    .mkt-btn {
      flex: 1;
      height: 34px;
      border: 1px solid rgba(61, 255, 160, 0.18);
      border-radius: 0;
      background: transparent;
      color: #4a5e52;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .mkt-btn:hover { color: #e8ede9; border-color: rgba(61, 255, 160, 0.4); }
    .mkt-btn.active {
      border-color: rgba(61, 255, 160, 0.6);
      color: #3dffa0;
      background: rgba(61, 255, 160, 0.04);
    }

    /* Field row */
    .field-row { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3b4a42;
    }

    /* Action button */
    .action-wrap { margin-top: 4px; }
    .action-btn {
      width: 100%;
      height: 50px;
      border: 1px solid rgba(61, 255, 160, 0.5);
      border-radius: 0;
      background: rgba(61, 255, 160, 0.04);
      color: #3dffa0;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .action-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 35%, rgba(61,255,160,0.08), transparent 65%);
      transform: translateX(-100%);
      animation: shimmer 3s linear infinite;
    }
    .action-btn-icon { font-size: 14px; opacity: 0.7; }
    .action-btn:hover {
      border-color: rgba(61,255,160,0.85);
      background: rgba(61,255,160,0.09);
      box-shadow: 0 0 24px rgba(61,255,160,0.1);
    }
    .action-btn:active { transform: scale(0.99); }

    /* Status */
    .status {
      min-height: 16px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3b4a42;
    }

    /* Result */
    .result {
      display: none;
      border: 1px solid rgba(61, 255, 160, 0.25);
      border-radius: 0;
      background: rgba(0,0,0,0.9);
      padding: 14px;
      gap: 8px;
      flex-direction: column;
    }
    .result.show { display: flex; animation: panelIn .3s ease; }
    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .signal {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .signal.up   { color: #2ecc71; }
    .signal.down { color: #ff4d6a; }
    .signal-badge-wrap { display: flex; }
    .signal-badge {
      height: 30px;
      padding: 0 12px;
      border-radius: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .signal-badge.buy  { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.4); color: #2ecc71; }
    .signal-badge.sell { background: rgba(255,77,106,0.1);  border: 1px solid rgba(255,77,106,0.4);  color: #ff4d6a; }
    .signal-badge .icon { font-size: 11px; }
    .confidence {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #4a5e52;
    }
    .progress {
      width: 100%;
      height: 2px;
      border-radius: 0;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1a8c52, #3dffa0);
      box-shadow: 0 0 6px rgba(61,255,160,0.4);
      transition: width .5s cubic-bezier(0.4,0,0.2,1);
    }
    .reasoning {
      font-size: 11px;
      color: #4a5e52;
      line-height: 1.6;
    }
    .metrics {
      border-top: 1px solid rgba(61, 255, 160, 0.1);
      padding-top: 8px;
      display: grid;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      color: #3b4a42;
      letter-spacing: 0.04em;
    }

    /* Partner */
    .partner { text-align: center; display: none; }
    .partner a {
      display: inline-block;
      text-decoration: none;
      color: #3b4a42;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid rgba(61, 255, 160, 0.18);
      border-radius: 0;
      padding: 9px 18px;
      transition: all 0.2s ease;
    }
    .partner a:hover { color: #3dffa0; border-color: rgba(61,255,160,0.5); }

    /* SIDE PANELS — поверх матрицы, без своего фона */
    .side-panel {
      position: absolute;
      inset: 0;
      z-index: 103;
      background: #000;
      display: none;
      flex-direction: column;
    }
    /* Заголовок и контент — полупрозрачный тёмный фон */
    /* Panel matrix canvas — same as main canvas but inside each overlay */
    .panel-matrix {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      opacity: 0.45;
      pointer-events: none;
    }
    /* All overlay content above panel-matrix */
    .side-panel > *:not(.panel-matrix) {
      position: relative;
      z-index: 1;
    }
    .side-panel.open {
      display: flex;
    }
    /* Анимация вперёд — слайд справа */
    .side-panel.anim-forward {
      animation: slideInRight 0.28s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    /* Анимация назад — слайд слева */
    .side-panel.anim-back {
      animation: slideInLeft 0.28s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .side-panel-head {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(61, 255, 160, 0.18);
      flex-shrink: 0;
      gap: 8px;
    }
    .side-panel-title {
      display: block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8ede9;
      padding: 14px 18px 10px;
      flex-shrink: 0;
    }
    .side-panel-close,
    .back-btn {
      border: 1px solid rgba(61, 255, 160, 0.25);
      background: rgba(0,0,0,0.9);
      color: #3dffa0;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 10px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .side-panel-close { width: 26px; height: 26px; padding: 0; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .side-panel-close:hover,
    .back-btn:hover {
      border-color: rgba(61, 255, 160, 0.6);
      box-shadow: 0 0 10px rgba(61, 255, 160, 0.15);
    }
    .head-spacer { width: 60px; }

    /* Screen content в overlay */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .scroll-list {
      gap: 8px;
    }

    /* Сетка 5 категорий: 3 сверху + 2 снизу */
    .cat-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cat-row {
      display: grid;
      gap: 12px;
    }
    .cat-row-top    { grid-template-columns: 1fr 1fr 1fr; }
    .cat-row-bottom { grid-template-columns: 1fr 1fr; }
    .cat-tile {
      border: 1px solid rgba(61, 255, 160, 0.35);
      border-radius: 0;
      background: rgba(0, 0, 0, 0.9);
      color: #e8ede9;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px 8px;
      transition: all 0.2s ease;
      line-height: 1.3;
      position: relative;
      z-index: 3;
    }
    .cat-tile:hover {
      border-color: rgba(61, 255, 160, 0.7);
      box-shadow: 0 0 20px rgba(61, 255, 160, 0.1);
    }
    .cat-tile:active { transform: scale(0.98); }

    /* ── АККОРДЕОН ── */
    .accordion-wrap {
      display: flex;
      flex-direction: column;
    }
    .accordion-btn {
      width: 100%;
      border: 1px solid rgba(61, 255, 160, 0.35);
      border-radius: 0;
      background: rgba(0, 0, 0, 0.9);
      position: relative;
      z-index: 3;
      color: #e8ede9;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
    }
    .accordion-btn:hover {
      border-color: rgba(61, 255, 160, 0.6);
      background: rgba(61, 255, 160, 0.03);
    }
    .accordion-arrow {
      font-size: 10px;
      color: #3dffa0;
      transition: transform 0.25s ease;
    }
    .accordion-arrow.open { transform: rotate(180deg); }

    .accordion-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 1px solid rgba(61, 255, 160, 0.18);
      border-right: 1px solid rgba(61, 255, 160, 0.18);
    }
    .accordion-list.open {
      max-height: 260px;
      overflow-y: auto;
      border-bottom: 1px solid rgba(61, 255, 160, 0.18);
    }
    .list-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(61, 255, 160, 0.08);
      background: rgba(0, 0, 0, 0.9);
      position: relative;
      z-index: 3;
      color: #e8ede9;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      padding: 13px 16px;
      cursor: pointer;
      transition: background 0.15s ease;
      display: block;
    }
    .list-item:last-child { border-bottom: 0; }
    .list-item:hover {
      background: rgba(61, 255, 160, 0.07);
      color: #3dffa0;
    }

    /* Зафиксированный выбор */
    .selected-row {
      border: 1px solid rgba(61, 255, 160, 0.25);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.9);
      position: relative;
      z-index: 3;
    }
    .selected-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3b4a42;
    }
    .selected-val {
      font-size: 13px;
      font-weight: 700;
      color: #3dffa0;
      letter-spacing: 0.04em;
    }

    /* Пульсирующая кнопка "Получить сигнал" */
    .pulse-btn {
      width: 100%;
      height: 60px;
      border: 1px solid rgba(61, 255, 160, 0.6);
      border-radius: 0;
      background: rgba(0, 0, 0, 0.9);
      position: relative;
      z-index: 3;
      color: #3dffa0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: pulseBorder 2s ease-in-out infinite;
      transition: all 0.2s ease;
    }
    .pulse-btn:hover {
      background: rgba(61, 255, 160, 0.12);
      box-shadow: 0 0 30px rgba(61, 255, 160, 0.15);
    }
    .pulse-btn:active { transform: scale(0.99); }
    @keyframes pulseBorder {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(61, 255, 160, 0);
        border-color: rgba(61, 255, 160, 0.6);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(61, 255, 160, 0.08);
        border-color: rgba(61, 255, 160, 1);
      }
    }

    /* Profile */
    .profile-box {
      padding: 18px;
    }
    .profile-head { display: flex; align-items: center; gap: 14px; }
    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 0;
      border: 1px solid rgba(61, 255, 160, 0.3);
      background: rgba(0,0,0,0.9) center/cover no-repeat;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #3dffa0;
    }
    .nick { font-size: 15px; font-weight: 700; color: #e8ede9; }
    .meta { margin-top: 3px; font-size: 12px; color: #3b4a42; }

    /* History */
    .history {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      border: 1px solid rgba(61, 255, 160, 0.15);
      border-radius: 0;
      background: rgba(0,0,0,0.9);
      padding: 11px 13px;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: rgba(61, 255, 160, 0.4); }
    .history-top {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 600;
      color: #e8ede9;
      margin-bottom: 5px;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      color: #3b4a42;
      letter-spacing: 0.04em;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 5px rgba(46,204,113,0.5);
      flex-shrink: 0;
    }
    .dot.down { background: #ff4d6a; box-shadow: 0 0 5px rgba(255,77,106,0.5); }
    .empty { font-size: 11px; color: #3b4a42; padding: 8px 0; }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer { to { transform: translateX(100%); } }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-logo">
    <p class="splash-title" data-text="Vector Oracle AI">Vector Oracle AI</p>
  </div>
  <div class="splash-bar-wrap">
    <div class="splash-bar-track">
      <div class="splash-bar-fill" id="splashFill"></div>
    </div>
    <div class="splash-pct" id="splashPct">0%</div>
  </div>
</div>

<!-- Matrix: fixed на весь экран, видна на всех страницах -->

<div id="mainScreen" class="screen">
  <div class="app">

    <canvas id="matrix"></canvas>

    <!-- HEADER -->    <div class="head">
      <div class="head-left">
        <span class="head-dot"></span>
        <h1 class="title">Vector Oracle AI</h1>
      </div>
    </div>

    <!-- MAIN MENU — 3 квадрата -->
    <div class="menu-grid">
      <button id="openSignal" class="tile tile-main" type="button">
        <span class="tile-label-main">Получить AI сигнал</span>
      </button>
      <div class="tiles-bottom">
        <button id="tabProfile" class="tile" type="button">
          <span class="tile-label">Профиль</span>
        </button>
        <button id="tabHistory" class="tile" type="button">
          <span class="tile-label">История<br>сигналов</span>
        </button>
      </div>
    </div>

    <!-- SIGNAL FLOW: 5 экранов wizard -->

    <!-- Step 1: выбор категории инструмента — 5 квадратов -->
    <div id="screenMarket" class="side-panel">
      <canvas class="panel-matrix"></canvas>
      <div class="side-panel-head">
        <button class="back-btn" data-back="main" type="button">← Назад</button>
        <span class="head-spacer"></span>
      </div>
      <span class="side-panel-title">Выберите инструмент</span>
      <div class="screen-content">
        <div class="cat-grid">
          <div class="cat-row cat-row-top">
            <button class="cat-tile" data-market="forex"       type="button">Валюты</button>
            <button class="cat-tile" data-market="indexes"     type="button">Индексы</button>
            <button class="cat-tile" data-market="stocks"      type="button">Акции</button>
          </div>
          <div class="cat-row cat-row-bottom">
            <button class="cat-tile" data-market="crypto"      type="button">Крипто&shy;валюты</button>
            <button class="cat-tile" data-market="commodities" type="button">Сырьевые товары</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Step 2: выбор инструмента — аккордеон -->
    <div id="screenPair" class="side-panel">
      <canvas class="panel-matrix"></canvas>
      <div class="side-panel-head">
        <button class="back-btn" data-back="market" type="button">← Назад</button>
        <span class="head-spacer"></span>
      </div>
      <span class="side-panel-title" id="pairTitle">Инструмент</span>
      <div class="screen-content">

        <!-- Выбранный актив (скрыт пока не выбран) -->
        <div id="selectedAssetRow" class="selected-row" style="display:none;">
          <span class="selected-label">Актив</span>
          <span id="selectedAssetVal" class="selected-val">—</span>
        </div>

        <!-- Кнопка выбрать актив + аккордеон -->
        <div id="assetAccordion" class="accordion-wrap">
          <button id="toggleAssetList" class="accordion-btn" type="button">
            Выбрать актив
            <span class="accordion-arrow" id="assetArrow">▼</span>
          </button>
          <div id="assetList" class="accordion-list"></div>
        </div>

        <!-- Выбор времени (скрыт пока не выбран актив) -->
        <div id="timeSection" style="display:none;">
          <div id="selectedTimeRow" class="selected-row" style="display:none;">
            <span class="selected-label">Время</span>
            <span id="selectedTimeVal" class="selected-val">—</span>
          </div>
          <div class="accordion-wrap">
            <button id="toggleTimeList" class="accordion-btn" type="button">
              Выбрать время сделки
              <span class="accordion-arrow" id="timeArrow">▼</span>
            </button>
            <div id="timeList" class="accordion-list">
              <button class="list-item" data-time="S3"  type="button">S3</button>
              <button class="list-item" data-time="S15" type="button">S15</button>
              <button class="list-item" data-time="S30" type="button">S30</button>
              <button class="list-item" data-time="M1"  type="button">M1</button>
              <button class="list-item" data-time="M3"  type="button">M3</button>
              <button class="list-item" data-time="M5"  type="button">M5</button>
              <button class="list-item" data-time="M30" type="button">M30</button>
              <button class="list-item" data-time="H1"  type="button">H1</button>
              <button class="list-item" data-time="H4"  type="button">H4</button>
            </div>
          </div>
        </div>

        <!-- Кнопка получить сигнал (скрыта пока не выбрано время) -->
        <div id="getSignalWrap" style="display:none;">
          <button id="getSignalBtn" class="pulse-btn" type="button">
            Получить сигнал
          </button>
        </div>

        <div id="status" class="status"></div>

      </div>
    </div>

    <!-- Step 3: выбор времени — УБРАН, теперь внутри screenPair -->
    <!-- Step 4: подтверждение — УБРАН, теперь внутри screenPair -->

    <!-- Step 5: результат -->
    <div id="screenResult" class="side-panel">
      <canvas class="panel-matrix"></canvas>
      <div class="side-panel-head">
        <button class="back-btn" data-back="main" type="button">✕ Закрыть</button>
        <span class="head-spacer"></span>
      </div>
      <span class="side-panel-title">Результат</span>
      <div class="screen-content">
        <div id="result" class="result show">
          <div class="result-top">
            <p id="signal" class="signal">—</p>
            <div id="signalCard" class="signal-badge-wrap" style="display:none;"></div>
          </div>
          <p id="confidence" class="confidence"></p>
          <div class="progress"><div id="confidenceBar"></div></div>
          <p id="reasoning" class="reasoning"></p>
          <div id="metrics" class="metrics"></div>
        </div>
        <div id="partner" class="partner">
          <a id="partnerLink" href="#" target="_blank" rel="noopener noreferrer">
            Открыть Pocket Option →
          </a>
        </div>
      </div>
    </div>

    <!-- PROFILE PANEL — overlay -->
    <div id="profilePanel" class="side-panel">
      <canvas class="panel-matrix"></canvas>
      <div class="side-panel-head">
        <button class="back-btn" data-back="main" type="button">← Назад</button>
        <span class="head-spacer"></span>
      </div>
      <span class="side-panel-title">Профиль</span>
      <div class="screen-content">
        <div class="profile-box">
          <div class="profile-head">
            <div id="profileAvatar" class="profile-avatar fallback">T</div>
            <div>
              <p id="profileName" class="nick">Trader</p>
              <p id="profileNick" class="meta">@trader</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- HISTORY PANEL — overlay -->
    <div id="historyPanel" class="side-panel">
      <canvas class="panel-matrix"></canvas>
      <div class="side-panel-head">
        <button class="back-btn" data-back="main" type="button">← Назад</button>
        <span class="head-spacer"></span>
      </div>
      <span class="side-panel-title">История сигналов</span>
      <div id="history" class="history"></div>
    </div>

  </div>

  <!-- hidden, kept for JS compatibility -->
  <button id="tabAnalyze" type="button" style="display:none;"></button>
</div>

<script>
  // ── SPLASH SCREEN ──
  (function() {
    const splash   = document.getElementById('splash');
    const fill     = document.getElementById('splashFill');
    const pctEl    = document.getElementById('splashPct');
    let pct = 0;

    const interval = setInterval(() => {
      // accelerate near end
      const step = pct < 80 ? (3 + Math.random() * 5) : (0.8 + Math.random() * 1.5);
      pct = Math.min(100, pct + step);
      fill.style.width = pct + '%';
      pctEl.textContent = Math.floor(pct) + '%';

      if (pct >= 100) {
        clearInterval(interval);
        // hold 1.2s at 100%, then glitch out
        setTimeout(() => {
          splash.classList.add('glitch-out');
          setTimeout(() => {
            splash.style.display = 'none';
          }, 500);
        }, 1200);
      }
    }, 60);
  })();

  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.expand();
    tg.ready();
    tg.setHeaderColor("#04090a");
    tg.setBackgroundColor("#04090a");
  }

  const currentUser = tg?.initDataUnsafe?.user || {};
  const userId = String(currentUser.id || "anonymous");
  const username = currentUser.username ? `@${currentUser.username}` : "@trader";
  const fullName = [currentUser.first_name, currentUser.last_name].filter(Boolean).join(" ") || "Trader";
  const profileImage = currentUser.photo_url || "";
  const historyStorageKey = `signal_history_${userId}`;

  const FOREX_PAIRS = [
    "AED/CNY OTC","AUD/CAD OTC","AUD/CHF OTC","CAD/CHF OTC","CAD/JPY OTC","EUR/GBP OTC","GBP/USD OTC","NGN/USD OTC","OMR/CNY OTC","SAR/CNY OTC","UAH/USD OTC","USD/BRL OTC","USD/CLP OTC","USD/DZD OTC","USD/PKR OTC","USD/RUB OTC","USD/SGD OTC","ZAR/USD OTC","EUR/HUF OTC","BHD/CNY OTC","EUR/CHF OTC","YER/USD OTC","CHF/JPY OTC","EUR/JPY OTC","EUR/NZD OTC","USD/INR OTC","KES/USD OTC","NZD/USD OTC","USD/PHP OTC","AUD/JPY OTC","CHF/NOK OTC","USD/CHF OTC","USD/IDR OTC","EUR/RUB OTC","QAR/CNY OTC","USD/BDT OTC","AUD/USD OTC","MAD/USD OTC","GBP/AUD OTC","AUD/NZD OTC","USD/EGP OTC","USD/MXN OTC","USD/VND OTC","EUR/TRY OTC","USD/CAD OTC","USD/ARS OTC","JOD/CNY OTC","USD/MYR OTC","TND/USD OTC","USD/THB OTC","LBP/USD OTC","USD/CNH OTC","USD/COP OTC","NZD/JPY OTC","GBP/JPY OTC","USD/JPY OTC"
  ];
  const CRYPTO = [
    "Cardano OTC","BNB OTC","Dogecoin OTC","Chainlink OTC","Polkadot OTC","Avalanche OTC","Bitcoin ETF OTC","Bitcoin OTC","Polygon OTC","Toncoin OTC","Solana OTC","Litecoin OTC","Ethereum OTC","TRON OTC"
  ];
  const STOCKS = [
    "American Express OTC","Intel OTC","Johnson & Johnson OTC","Tesla OTC","Advanced Micro Devices OTC","Citigroup Inc OTC","Coinbase Global OTC","VIX OTC","McDonald's OTC","Alibaba OTC","ExxonMobil OTC","Apple OTC","Netflix OTC","Amazon OTC","Boeing Company OTC","Palantir Technologies OTC","GameStop Corp OTC","Marathon Digital Holdings OTC","FedEx OTC","VISA OTC","FACEBOOK INC OTC","Cisco OTC","Pfizer Inc OTC","Microsoft OTC"
  ];
  const INDEXES = [
    "AUS 200 OTC","100GBP OTC","D30EUR OTC","DJI30 OTC","E35EUR OTC",
    "E50EUR OTC","F40EUR OTC","JPN225 OTC","US100","US100 OTC",
    "SP500","SP500 OTC","100GBP","AEX 25","CAC 40",
    "D30/EUR","DJI30","E35EUR","E50/EUR","F40/EUR",
    "HONG KONG 33","JPN225","SMI 20","AUS 200"
  ];
  const COMMODITIES = [
    "Brent Oil OTC","WTI Crude Oil OTC","Silver OTC","Gold OTC","Natural Gas OTC",
    "Palladium spot OTC","Platinum spot OTC","Brent Oil","WTI Crude Oil",
    "XAG/EUR Silver","XAU/EUR Gold","Natural Gas","Palladium spot","Platinum spot"
  ];
  const MARKET_DATA = {
    forex: FOREX_PAIRS, crypto: CRYPTO, stocks: STOCKS,
    indexes: INDEXES, commodities: COMMODITIES
  };
  let activeMarket = "forex";

  // Nav elements
  const tabAnalyze  = document.getElementById("tabAnalyze");
  const tabProfile  = document.getElementById("tabProfile");
  const tabHistory  = document.getElementById("tabHistory");
  const openSignal  = document.getElementById("openSignal");

  // Wizard screens
  const screenMarket = document.getElementById("screenMarket");
  const screenPair   = document.getElementById("screenPair");
  const screenResult = document.getElementById("screenResult");
  const profilePanel = document.getElementById("profilePanel");
  const historyPanel = document.getElementById("historyPanel");

  const pairTitle        = document.getElementById("pairTitle");
  const toggleAssetList  = document.getElementById("toggleAssetList");
  const assetList        = document.getElementById("assetList");
  const assetArrow       = document.getElementById("assetArrow");
  const selectedAssetRow = document.getElementById("selectedAssetRow");
  const selectedAssetVal = document.getElementById("selectedAssetVal");
  const timeSection      = document.getElementById("timeSection");
  const toggleTimeList   = document.getElementById("toggleTimeList");
  const timeList         = document.getElementById("timeList");
  const timeArrow        = document.getElementById("timeArrow");
  const selectedTimeRow  = document.getElementById("selectedTimeRow");
  const selectedTimeVal  = document.getElementById("selectedTimeVal");
  const getSignalWrap    = document.getElementById("getSignalWrap");
  const getSignalBtn     = document.getElementById("getSignalBtn");
  const statusEl         = document.getElementById("status");
  const resultEl         = document.getElementById("result");
  const signalEl         = document.getElementById("signal");
  const confidenceEl     = document.getElementById("confidence");
  const reasoningEl      = document.getElementById("reasoning");
  const confidenceBar    = document.getElementById("confidenceBar");
  const metricsEl        = document.getElementById("metrics");
  const signalCardEl     = document.getElementById("signalCard");
  const partnerWrapEl    = document.getElementById("partner");
  const partnerLinkEl    = document.getElementById("partnerLink");
  const profileAvatar    = document.getElementById("profileAvatar");
  const profileName      = document.getElementById("profileName");
  const profileNick      = document.getElementById("profileNick");
  const historyEl        = document.getElementById("history");

  // Set profile info
  profileName.textContent = fullName;
  profileNick.textContent = username;
  if (profileImage) {
    profileAvatar.style.backgroundImage = `url(${profileImage})`;
    profileAvatar.textContent = "";
  } else {
    profileAvatar.textContent = (fullName || "T").slice(0, 1).toUpperCase();
  }

  // ── WIZARD STATE ──
  let selectedMarket = null;
  let selectedPair   = null;
  let selectedTime   = null;
  const MARKET_LABELS = {
    forex: "ВАЛЮТЫ", indexes: "ИНДЕКСЫ", stocks: "АКЦИИ",
    crypto: "КРИПТОВАЛЮТЫ", commodities: "СЫРЬЕВЫЕ ТОВАРЫ"
  };

  function closeAllPanels() {
    [screenMarket, screenPair, screenResult, profilePanel, historyPanel]
      .forEach(p => {
        p.classList.remove("open", "anim-forward", "anim-back");
        p.style.display = "none";
      });
  }

  function openPanel(panel, direction = "forward") {
    closeAllPanels();
    panel.style.display = "flex";
    panel.offsetHeight;
    panel.classList.add("open");
    panel.classList.add(direction === "back" ? "anim-back" : "anim-forward");
  }

  // Сброс состояния экрана выбора инструмента
  function resetPairScreen() {
    selectedPair = null;
    selectedTime = null;
    selectedAssetRow.style.display = "none";
    selectedAssetVal.textContent = "—";
    document.getElementById("assetAccordion").style.display = "flex";
    assetList.classList.remove("open");
    assetArrow.classList.remove("open");
    timeSection.style.display = "none";
    selectedTimeRow.style.display = "none";
    selectedTimeVal.textContent = "—";
    document.getElementById("toggleTimeList").parentElement.style.display = "flex";
    timeList.classList.remove("open");
    timeArrow.classList.remove("open");
    getSignalWrap.style.display = "none";
    statusEl.textContent = "";
  }

  // Main menu tiles
  openSignal.addEventListener("click", () => openPanel(screenMarket, "forward"));
  tabProfile.addEventListener("click", () => openPanel(profilePanel, "forward"));
  tabHistory.addEventListener("click", () => { openPanel(historyPanel, "forward"); loadHistory(); });

  // Step 1 → категория выбрана
  screenMarket.querySelectorAll(".cat-tile").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedMarket = btn.dataset.market;
      pairTitle.textContent = MARKET_LABELS[selectedMarket];
      resetPairScreen();
      buildAssetList(selectedMarket);
      openPanel(screenPair, "forward");
    });
  });

  // Аккордеон — список активов
  function buildAssetList(market) {
    assetList.innerHTML = "";
    MARKET_DATA[market].forEach(item => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "list-item";
      btn.textContent = item;
      btn.addEventListener("click", () => {
        selectedPair = item;
        selectedAssetVal.textContent = item;
        selectedAssetRow.style.display = "flex";
        // скрываем кнопку выбора актива полностью
        document.getElementById("assetAccordion").style.display = "none";
        // закрываем аккордеон
        assetList.classList.remove("open");
        assetArrow.classList.remove("open");
        // показываем выбор времени
        timeSection.style.display = "flex";
        timeSection.style.flexDirection = "column";
        timeSection.style.gap = "10px";
      });
      assetList.appendChild(btn);
    });
  }

  toggleAssetList.addEventListener("click", () => {
    const isOpen = assetList.classList.toggle("open");
    assetArrow.classList.toggle("open", isOpen);
  });

  // Аккордеон — список времён
  toggleTimeList.addEventListener("click", () => {
    const isOpen = timeList.classList.toggle("open");
    timeArrow.classList.toggle("open", isOpen);
  });

  timeList.querySelectorAll(".list-item").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedTime = btn.dataset.time;
      selectedTimeVal.textContent = btn.dataset.time;
      selectedTimeRow.style.display = "flex";
      // скрываем кнопку выбора времени
      document.getElementById("toggleTimeList").parentElement.style.display = "none";
      // закрываем аккордеон
      timeList.classList.remove("open");
      timeArrow.classList.remove("open");
      // показываем кнопку получить сигнал
      getSignalWrap.style.display = "block";
    });
  });

  // Back buttons
  document.querySelectorAll(".back-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = btn.dataset.back;
      if (target === "main")   { closeAllPanels(); return; }
      if (target === "market") { openPanel(screenMarket, "back"); return; }
      if (target === "pair")   { openPanel(screenPair,   "back"); return; }
    });
  });

  function renderHistory(items) {
    if (!items || items.length === 0) {
      historyEl.innerHTML = '<div class="empty">Сигналов пока нет.</div>';
      return;
    }
    historyEl.innerHTML = items.map((item) => {
      const time = new Date(item.createdAt).toLocaleString("ru-RU");
      const dir = item.signal === "BUY" ? "КУПИТЬ" : "ПРОДАТЬ";
      return `
        <div class="history-item">
          <div class="history-top">
            <span>${item.instrument} • ${item.timeframe}</span>
            <span>${time}</span>
          </div>
          <div class="badge"><span class="dot ${item.signal === "SELL" ? "down" : ""}"></span>Сигнал: ${dir} | Точность: ${item.accuracy}%</div>
        </div>
      `;
    }).join("");
  }

  function loadHistory() {
    const raw = localStorage.getItem(historyStorageKey);
    const items = raw ? JSON.parse(raw) : [];
    renderHistory(items);
  }

  getSignalBtn.addEventListener("click", () => {
    const pair = selectedPair;
    const expiry = selectedTime;
    if (!pair || !expiry) return;

    // Lock UI during analysis
    getSignalBtn.disabled = true;
    statusEl.textContent = "AI АНАЛИЗИРУЕТ 0%";
    resultEl.classList.remove("show");
    partnerWrapEl.style.display = "none";
    signalCardEl.style.display = "none";
    metricsEl.innerHTML = "";
    confidenceBar.style.width = "0%";
    reasoningEl.textContent = "";

    const finalAccuracy = Math.floor(75 + Math.random() * 26);
    const power = Math.floor(80 + Math.random() * 21);
    const volume = Math.floor(40 + Math.random() * 61);
    const precision = Math.floor(75 + Math.random() * 26);
    const signalType = Math.random() < 0.5 ? "BUY" : "SELL";
    const signalText = signalType === "BUY" ? "СИГНАЛ: КУПИТЬ" : "СИГНАЛ: ПРОДАТЬ";
    const signalClass = signalType === "BUY" ? "up" : "down";

    let progress = 0;
    const ticker = setInterval(() => {
      const step = Math.floor(5 + Math.random() * 14);
      progress = Math.min(100, progress + step);
      statusEl.textContent = `AI АНАЛИЗИРУЕТ ${progress}%`;
      if (progress < 100) return;
      clearInterval(ticker);

      // Switch to result screen
      openPanel(screenResult);
      getSignalBtn.disabled = false;

      signalEl.textContent = signalText;
      signalEl.className = `signal ${signalClass}`;
      confidenceBar.style.width = `${finalAccuracy}%`;
      confidenceEl.textContent = `Точность сигнала: ${finalAccuracy}%`;
      reasoningEl.textContent = "Нейросеть завершила анализ рыночной структуры";
      metricsEl.innerHTML = `
        <div>Сила актива — ${power}%</div>
        <div>Объём рынка — ${volume}%</div>
        <div>Точность модели — ${precision}%</div>
      `;
      signalCardEl.style.display = "flex";
      signalCardEl.innerHTML = `
        <div class="signal-badge ${signalType === "BUY" ? "buy" : "sell"}">
          <span class="icon">${signalType === "BUY" ? "↗" : "↘"}</span>
          <span>${signalType === "BUY" ? "КУПИТЬ" : "ПРОДАТЬ"}</span>
        </div>
      `;

      resultEl.classList.add("show");
      partnerWrapEl.style.display = "block";
      statusEl.textContent = "";
      partnerLinkEl.href = "https://pocketoption.com";

      const existing = JSON.parse(localStorage.getItem(historyStorageKey) || "[]");
      existing.push({
        instrument: pair,
        timeframe: expiry,
        signal: signalType,
        accuracy: finalAccuracy,
        createdAt: new Date().toISOString(),
      });
      localStorage.setItem(historyStorageKey, JSON.stringify(existing.slice(-30)));
      loadHistory();
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
    }, 180);
  });

  // Matrix background animation
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");
  const glyphs = "01アイウエオカキクケコサシスセソ1234567890BTCUSDT▲▼";
  let columns = [];
  const fontSize = 14;

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = Math.max(1, Math.floor(rect.width));
    canvas.height = Math.max(1, Math.floor(rect.height));
    const count = Math.floor(canvas.width / fontSize);
    columns = new Array(count).fill(0).map(() => Math.random() * canvas.height / fontSize);
  }

  function draw() {
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);    ctx.font = `${fontSize}px monospace`;

    for (let i = 0; i < columns.length; i++) {
      const text = glyphs[Math.floor(Math.random() * glyphs.length)];
      const x = i * fontSize;
      const y = columns[i] * fontSize;
      const g = 120 + Math.floor(Math.random() * 120);
      ctx.fillStyle = `rgb(35, ${g}, 95)`;
      ctx.fillText(text, x, y);
      if (y > canvas.height && Math.random() > 0.975) columns[i] = 0;
      columns[i] += 1;
    }
  }

  window.addEventListener("resize", resize);
  resize();
  setInterval(draw, 40);
  loadHistory();

  // ── PANEL MATRIX: run matrix animation on all overlay canvases ──
  (function() {
    const panelGlyphs = "01アイウエオカキクケコサシスセソ1234567890BTCUSDT▲▼";
    const pFontSize = 14;

    document.querySelectorAll('.panel-matrix').forEach(pc => {
      const pCtx = pc.getContext('2d');
      let pCols = [];

      function pResize() {
        const rect = pc.parentElement.getBoundingClientRect();
        pc.width  = Math.max(1, Math.floor(rect.width  || 380));
        pc.height = Math.max(1, Math.floor(rect.height || 640));
        const count = Math.floor(pc.width / pFontSize);
        pCols = new Array(count).fill(0).map(() => Math.random() * pc.height / pFontSize);
      }

      function pDraw() {
        pCtx.fillStyle = "rgba(0, 0, 0, 0.12)";
        pCtx.fillRect(0, 0, pc.width, pc.height);
        pCtx.font = `${pFontSize}px monospace`;
        for (let i = 0; i < pCols.length; i++) {
          const text = panelGlyphs[Math.floor(Math.random() * panelGlyphs.length)];
          const g = 120 + Math.floor(Math.random() * 120);
          pCtx.fillStyle = `rgb(35, ${g}, 95)`;
          pCtx.fillText(text, i * pFontSize, pCols[i] * pFontSize);
          if (pCols[i] * pFontSize > pc.height && Math.random() > 0.975) pCols[i] = 0;
          pCols[i] += 1;
        }
      }

      pResize();
      setInterval(pDraw, 40);
      window.addEventListener("resize", pResize);
    });
  })();
</script>
</body>
</html>
