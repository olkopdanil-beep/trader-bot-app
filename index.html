<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Trade Analyzer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./config.js"></script>
  <style>
    :root {
      --bg: #020505;
      --glass: rgba(0, 0, 0, 0.6);
      --line: rgba(58, 255, 142, 0.4);
      --line-soft: rgba(86, 104, 96, 0.35);
      --text: #eafff2;
      --muted: #98aa9f;
      --neon: #43ff9f;
      --neon-soft: rgba(67, 255, 159, 0.3);
      --danger: #ff617f;
      --ok: #35e386;
      --hud-dark: rgba(5, 11, 9, 0.7);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    #matrix {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.25;
    }

    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: filter .35s ease, opacity .35s ease;
    }

    .screen.blurred {
      filter: blur(10px) brightness(0.45);
      opacity: .72;
      pointer-events: none;
    }

    .app {
      width: min(760px, 100%);
      background: var(--glass);
      border: 1px solid var(--line-soft);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      padding: 18px;
    }

    .head {
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: 27px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.2), 0 0 16px rgba(67, 255, 159, 0.18);
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.35px;
      text-transform: uppercase;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab-btn {
      border: 1px solid var(--line-soft);
      color: var(--text);
      background: var(--hud-dark);
      border-radius: 12px;
      height: 42px;
      cursor: pointer;
      font-weight: 700;
      transition: all .22s ease;
      letter-spacing: .25px;
    }

    .tab-btn:hover {
      box-shadow: inset 0 0 20px var(--neon-soft), 0 0 10px rgba(60, 255, 151, 0.22);
      border-color: var(--line);
    }

    .tab-btn.active {
      background: linear-gradient(90deg, rgba(20, 52, 36, 0.84), rgba(17, 56, 35, 0.84));
      border-color: var(--line);
      box-shadow: inset 0 0 24px var(--neon-soft);
    }

    .panel {
      display: none;
      border: 1px solid var(--line-soft);
      border-radius: 15px;
      background: rgba(7, 12, 10, 0.68);
      backdrop-filter: blur(12px);
      padding: 14px;
    }
    .panel.active { display: block; animation: panelIn .28s ease; }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .segment {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .segment-btn {
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      height: 38px;
      background: rgba(10, 16, 14, 0.9);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
    }
    .segment-btn.active {
      border-color: var(--line);
      box-shadow: inset 0 0 20px var(--neon-soft);
      background: linear-gradient(90deg, rgba(20, 52, 36, 0.9), rgba(17, 56, 35, 0.9));
    }

    label {
      display: block;
      font-size: 12px;
      color: #8ea89a;
      margin-bottom: 4px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    .ios-select {
      position: relative;
    }
    .ios-select-trigger {
      width: 100%;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(18, 24, 22, 0.92), rgba(10, 16, 14, 0.92));
      color: var(--text);
      padding: 0 38px 0 12px;
      outline: none;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      transition: border-color .2s ease, box-shadow .2s ease, transform .18s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), inset 0 -1px 0 rgba(0, 0, 0, 0.35);
    }
    .ios-select-trigger::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 50%;
      width: 8px;
      height: 8px;
      border-right: 2px solid #9fd8b8;
      border-bottom: 2px solid #9fd8b8;
      transform: translateY(-60%) rotate(45deg);
      transition: transform .24s ease;
      pointer-events: none;
    }
    .ios-select.open .ios-select-trigger {
      border-color: var(--line);
      box-shadow: 0 0 0 3px rgba(67, 255, 159, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }
    .ios-select.open .ios-select-trigger::after {
      transform: translateY(-25%) rotate(-135deg);
    }
    .ios-select-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: rgba(14, 20, 18, 0.98);
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.42);
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
      pointer-events: none;
      transition: opacity .24s ease, transform .24s ease;
      z-index: 10;
    }
    .ios-select.open .ios-select-menu {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .ios-option {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: transparent;
      color: #eafff2;
      text-align: left;
      padding: 11px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s ease, color .18s ease;
    }
    .ios-option:last-child { border-bottom: 0; }
    .ios-option:hover {
      background: rgba(67, 255, 159, 0.18);
      color: #f4fff8;
    }

    .upload-wrap {
      display: none;
      margin-top: 8px;
      animation: panelIn .25s ease;
    }

    .upload-btn {
      width: 100%;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      height: 42px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: .25px;
      cursor: pointer;
      background: var(--hud-dark);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      transition: all .22s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .upload-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,.24), transparent 80%);
      transform: translateX(-130%);
      animation: shimmer 2.4s linear infinite;
      pointer-events: none;
    }

    .upload-btn:hover {
      box-shadow: inset 0 0 20px var(--neon-soft), 0 0 10px rgba(60, 255, 151, 0.22);
      border-color: var(--line);
    }
    .upload-btn:active {
      transform: translateY(1px);
    }
    .action-wrap {
      display: none;
      margin-top: 8px;
      animation: panelIn .25s ease;
    }
    .action-btn {
      width: 100%;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      height: 44px;
      color: var(--text);
      font-weight: 800;
      letter-spacing: .35px;
      cursor: pointer;
      background: linear-gradient(90deg, rgba(20, 52, 36, 0.95), rgba(17, 56, 35, 0.95));
      transition: all .22s ease;
    }
    .action-btn:hover {
      box-shadow: inset 0 0 24px var(--neon-soft), 0 0 10px rgba(60, 255, 151, 0.22);
      border-color: var(--line);
    }

    @keyframes shimmer {
      to { transform: translateX(130%); }
    }

    input[type="file"] { display: none; }

    .status {
      margin-top: 10px;
      min-height: 22px;
      color: #79f3b5;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
    }

    .result {
      margin-top: 12px;
      display: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.4);
      padding: 12px;
    }
    .result.show { display: block; animation: panelIn .25s ease; }

    .signal {
      margin: 0;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: .25px;
    }
    .signal.up { color: var(--ok); text-shadow: 0 0 16px rgba(53, 227, 134, 0.4); }
    .signal.down { color: var(--danger); text-shadow: 0 0 16px rgba(255, 97, 127, 0.35); }

    .confidence { margin: 8px 0 6px; font-size: 20px; font-weight: 800; }
    .progress {
      margin: 8px 0 9px;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(67, 255, 159, 0.25);
      overflow: hidden;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1d8d57, #42ff9f);
      box-shadow: 0 0 12px rgba(67, 255, 159, 0.42);
      transition: width .45s ease;
    }
    .reasoning { margin: 0; color: #bdd8c8; line-height: 1.45; }
    .metrics {
      margin-top: 10px;
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 10px;
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #d5eadf;
    }
    .signal-card {
      margin-top: 12px;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, .38);
    }
    .signal-badge {
      min-width: 150px;
      height: 42px;
      border-radius: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      font-weight: 800;
      letter-spacing: .4px;
      text-transform: uppercase;
      border-radius: 6px;
    }
    .signal-badge.buy {
      background: #23b34f;
    }
    .signal-badge.sell {
      background: #ff3d35;
    }
    .signal-badge .icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      background: rgba(0,0,0,.22);
    }

    .partner {
      margin-top: 12px;
      display: none;
      text-align: center;
    }
    .partner a {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      border-radius: 12px;
      padding: 0 16px;
      line-height: 42px;
      border: 1px solid var(--line-soft);
      background: var(--hud-dark);
      transition: all .22s ease;
    }
    .partner a:hover {
      box-shadow: inset 0 0 20px var(--neon-soft), 0 0 10px rgba(60, 255, 151, 0.22);
      border-color: var(--line);
    }

    .profile-box {
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.34);
      padding: 12px;
      margin-bottom: 10px;
    }

    .nick {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }
    .profile-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .profile-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid var(--line-soft);
      object-fit: cover;
      background: rgba(255,255,255,.08);
      flex-shrink: 0;
    }
    .profile-avatar.fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: var(--text);
      background: linear-gradient(180deg, rgba(18, 24, 22, 0.92), rgba(10, 16, 14, 0.92));
    }
    .meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .history-title {
      margin: 10px 0 8px;
      font-size: 15px;
      font-weight: 800;
      color: #c7f7dc;
    }

    .history {
      max-height: 320px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      background: rgba(7, 16, 12, 0.55);
      padding: 9px 10px;
      font-size: 13px;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #dffff0;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #43ff9f;
      box-shadow: 0 0 10px rgba(67, 255, 159, 0.6);
    }
    .dot.down {
      background: #ff617f;
      box-shadow: 0 0 10px rgba(255, 97, 127, 0.5);
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
    }

    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      background: radial-gradient(circle at top, rgba(67, 255, 159, 0.09), transparent 45%), rgba(2, 5, 5, 0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 1;
      transform: translateY(0);
      animation: introFadeIn .6s ease-out;
    }
    .intro-overlay.hidden {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .35s ease, transform .35s ease;
    }
    .intro-title {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.6rem;
      text-transform: uppercase;
      text-align: center;
      margin: 0 0 10px;
      text-shadow: 0 0 18px rgba(67, 255, 159, 0.55);
    }
    .intro-subtitle {
      margin: 0 0 26px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .35rem;
      color: var(--muted);
      text-align: center;
    }
    .intro-btn {
      min-width: 220px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: linear-gradient(90deg, #1f9d62, #42ff9f);
      color: #020505;
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      padding: 11px 22px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.55);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .intro-btn:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.55);
    }
    .intro-noise {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 2px);
      mix-blend-mode: screen;
      opacity: .7;
    }
    @keyframes introFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<canvas id="matrix"></canvas>

<div id="introOverlay" class="intro-overlay">
  <div class="intro-noise"></div>
  <div style="position: relative; z-index: 1; text-align: center;">
    <p class="intro-title">КАМПУС ТРЕЙДЕРА</p>
    <p class="intro-subtitle">matrix trade environment</p>
    <button id="introStart" class="intro-btn" type="button">НАЧАТЬ</button>
  </div>
</div>

<div id="mainScreen" class="screen">
  <div class="app">
    <div class="head">
      <h1 class="title">Matrix Trade Analyzer</h1>
      <p class="subtitle">AI анализ завершен</p>
    </div>

    <div class="tabs">
      <button id="tabAnalyze" class="tab-btn active" type="button">Анализ скриншота</button>
      <button id="tabProfile" class="tab-btn" type="button">Профиль</button>
    </div>

    <section id="analyzePanel" class="panel active">
      <div class="grid-2">
        <div>
          <label>Раздел</label>
          <div class="segment" id="marketSegment">
            <button type="button" class="segment-btn active" data-market="forex">Валюты</button>
            <button type="button" class="segment-btn" data-market="crypto">Криптовалюты</button>
            <button type="button" class="segment-btn" data-market="stocks">Акции</button>
          </div>
        </div>
      </div>

      <div class="grid-1">
        <div>
          <label for="pairSelect">Инструмент</label>
          <div class="ios-select" id="pairSelect">
            <button class="ios-select-trigger" type="button" data-value="">Выберите</button>
            <div class="ios-select-menu">
            </div>
          </div>
        </div>
      </div>

      <div id="timeWrap" class="grid-1" style="display:none;">
        <div>
          <label for="expirySelect">Время</label>
          <div class="ios-select" id="expirySelect">
            <button class="ios-select-trigger" type="button" data-value="">Выберите</button>
            <div class="ios-select-menu">
              <button class="ios-option" type="button" data-value="15s">15s</button>
              <button class="ios-option" type="button" data-value="30s">30s</button>
              <button class="ios-option" type="button" data-value="1m">1m</button>
              <button class="ios-option" type="button" data-value="3m">3m</button>
              <button class="ios-option" type="button" data-value="5m">5m</button>
            </div>
          </div>
        </div>
      </div>

      <div id="actionWrap" class="action-wrap">
        <button id="getSignalBtn" class="action-btn" type="button">ПОЛУЧИТЬ AI СИГНАЛ</button>
      </div>

      <div id="status" class="status"></div>

      <div id="result" class="result">
        <p id="signal" class="signal">—</p>
        <p id="confidence" class="confidence"></p>
        <div class="progress"><div id="confidenceBar"></div></div>
        <p id="reasoning" class="reasoning"></p>
        <div id="metrics" class="metrics"></div>
        <div id="signalCard" class="signal-card" style="display:none;"></div>
      </div>

      <div id="partner" class="partner">
        <a id="partnerLink" href="#" target="_blank" rel="noopener noreferrer">Открыть Pocket Option</a>
      </div>
    </section>

    <section id="profilePanel" class="panel">
      <div class="profile-box">
        <div class="profile-head">
          <img id="profileAvatar" class="profile-avatar" alt="avatar">
          <div>
            <p id="profileName" class="nick">Trader</p>
            <p id="profileNick" class="meta">@trader</p>
          </div>
        </div>
        <p id="profileMeta" class="meta">История последних сигналов</p>
      </div>
      <div class="history-title">История сигналов</div>
      <div id="history" class="history"></div>
    </section>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.expand();
    tg.ready();
    tg.setHeaderColor("#04090a");
    tg.setBackgroundColor("#04090a");
  }

  const currentUser = tg?.initDataUnsafe?.user || {};
  const userId = String(currentUser.id || "anonymous");
  const username = currentUser.username ? `@${currentUser.username}` : "@trader";
  const fullName = [currentUser.first_name, currentUser.last_name].filter(Boolean).join(" ") || "Trader";
  const profileImage = currentUser.photo_url || "";
  const historyStorageKey = `signal_history_${userId}`;

  const FOREX_PAIRS = [
    "AED/CNY OTC","AUD/CAD OTC","AUD/CHF OTC","CAD/CHF OTC","CAD/JPY OTC","EUR/GBP OTC","GBP/USD OTC","NGN/USD OTC","OMR/CNY OTC","SAR/CNY OTC","UAH/USD OTC","USD/BRL OTC","USD/CLP OTC","USD/DZD OTC","USD/PKR OTC","USD/RUB OTC","USD/SGD OTC","ZAR/USD OTC","EUR/HUF OTC","BHD/CNY OTC","EUR/CHF OTC","YER/USD OTC","CHF/JPY OTC","EUR/JPY OTC","EUR/NZD OTC","USD/INR OTC","KES/USD OTC","NZD/USD OTC","USD/PHP OTC","AUD/JPY OTC","CHF/NOK OTC","USD/CHF OTC","USD/IDR OTC","EUR/RUB OTC","QAR/CNY OTC","USD/BDT OTC","AUD/USD OTC","MAD/USD OTC","GBP/AUD OTC","AUD/NZD OTC","USD/EGP OTC","USD/MXN OTC","USD/VND OTC","EUR/TRY OTC","USD/CAD OTC","USD/ARS OTC","JOD/CNY OTC","USD/MYR OTC","TND/USD OTC","USD/THB OTC","LBP/USD OTC","USD/CNH OTC","USD/COP OTC","NZD/JPY OTC","GBP/JPY OTC","USD/JPY OTC"
  ];
  const CRYPTO = [
    "Cardano OTC","BNB OTC","Dogecoin OTC","Chainlink OTC","Polkadot OTC","Avalanche OTC","Bitcoin ETF OTC","Bitcoin OTC","Polygon OTC","Toncoin OTC","Solana OTC","Litecoin OTC","Ethereum OTC","TRON OTC"
  ];
  const STOCKS = [
    "American Express OTC","Intel OTC","Johnson & Johnson OTC","Tesla OTC","Advanced Micro Devices OTC","Citigroup Inc OTC","Coinbase Global OTC","VIX OTC","McDonald's OTC","Alibaba OTC","ExxonMobil OTC","Apple OTC","Netflix OTC","Amazon OTC","Boeing Company OTC","Palantir Technologies OTC","GameStop Corp OTC","Marathon Digital Holdings OTC","FedEx OTC","VISA OTC","FACEBOOK INC OTC","Cisco OTC","Pfizer Inc OTC","Microsoft OTC"
  ];
  const MARKET_DATA = { forex: FOREX_PAIRS, crypto: CRYPTO, stocks: STOCKS };
  let activeMarket = "forex";

  const tabAnalyze = document.getElementById("tabAnalyze");
  const tabProfile = document.getElementById("tabProfile");
  const analyzePanel = document.getElementById("analyzePanel");
  const profilePanel = document.getElementById("profilePanel");
  const marketSegment = document.getElementById("marketSegment");
  const timeWrap = document.getElementById("timeWrap");

  const pairSelect = document.getElementById("pairSelect");
  const expirySelect = document.getElementById("expirySelect");
  const actionWrap = document.getElementById("actionWrap");
  const getSignalBtn = document.getElementById("getSignalBtn");

  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const signalEl = document.getElementById("signal");
  const confidenceEl = document.getElementById("confidence");
  const reasoningEl = document.getElementById("reasoning");
  const confidenceBar = document.getElementById("confidenceBar");
  const metricsEl = document.getElementById("metrics");
  const signalCardEl = document.getElementById("signalCard");
  const partnerWrapEl = document.getElementById("partner");
  const partnerLinkEl = document.getElementById("partnerLink");

  const profileAvatar = document.getElementById("profileAvatar");
  const profileName = document.getElementById("profileName");
  const profileNick = document.getElementById("profileNick");
  const historyEl = document.getElementById("history");
  profileName.textContent = fullName;
  profileNick.textContent = username;
  if (profileImage) {
    profileAvatar.src = profileImage;
  } else {
    profileAvatar.removeAttribute("src");
    profileAvatar.classList.add("fallback");
    profileAvatar.textContent = (fullName || "T").slice(0, 1).toUpperCase();
  }

  function switchTab(isProfile) {
    tabAnalyze.classList.toggle("active", !isProfile);
    tabProfile.classList.toggle("active", isProfile);
    analyzePanel.classList.toggle("active", !isProfile);
    profilePanel.classList.toggle("active", isProfile);
    if (isProfile) loadHistory();
  }

  tabAnalyze.addEventListener("click", () => switchTab(false));
  tabProfile.addEventListener("click", () => switchTab(true));

  function selectedValue(selectEl) {
    return selectEl.querySelector(".ios-select-trigger").dataset.value || "";
  }

  function closeAllSelects() {
    document.querySelectorAll(".ios-select.open").forEach((el) => el.classList.remove("open"));
  }

  function setSelectValue(selectEl, value, label) {
    const trigger = selectEl.querySelector(".ios-select-trigger");
    trigger.dataset.value = value || "";
    trigger.textContent = label || "Выберите";
  }

  function populateInstrumentOptions() {
    const menu = pairSelect.querySelector(".ios-select-menu");
    menu.innerHTML = "";
    MARKET_DATA[activeMarket].forEach((item) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ios-option";
      btn.dataset.value = item;
      btn.textContent = item;
      menu.appendChild(btn);
    });
    setupCustomSelect(pairSelect, true);
  }

  function setupCustomSelect(selectEl) {
    const trigger = selectEl.querySelector(".ios-select-trigger");
    const options = selectEl.querySelectorAll(".ios-option");
    trigger.addEventListener("click", () => {
      const willOpen = !selectEl.classList.contains("open");
      closeAllSelects();
      if (willOpen) selectEl.classList.add("open");
    });
    options.forEach((opt) => {
      opt.addEventListener("click", () => {
        trigger.dataset.value = opt.dataset.value;
        trigger.textContent = opt.dataset.value;
        selectEl.classList.remove("open");
        if (selectEl === pairSelect) {
          timeWrap.style.display = "grid";
          setSelectValue(expirySelect, "", "Выберите");
        }
        updateUploadVisibility();
      });
    });
  }

  function updateUploadVisibility() {
    const ready = selectedValue(pairSelect) && selectedValue(expirySelect);
    actionWrap.style.display = ready ? "block" : "none";
  }

  marketSegment.querySelectorAll(".segment-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      marketSegment.querySelectorAll(".segment-btn").forEach((x) => x.classList.remove("active"));
      btn.classList.add("active");
      activeMarket = btn.dataset.market;
      setSelectValue(pairSelect, "", "Выберите");
      setSelectValue(expirySelect, "", "Выберите");
      timeWrap.style.display = "none";
      actionWrap.style.display = "none";
      populateInstrumentOptions();
      resultEl.classList.remove("show");
      signalCardEl.style.display = "none";
      closeAllSelects();
    });
  });

  setupCustomSelect(pairSelect);
  setupCustomSelect(expirySelect);
  populateInstrumentOptions();
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".ios-select")) closeAllSelects();
  });
  updateUploadVisibility();

  function renderHistory(items) {
    if (!items || items.length === 0) {
      historyEl.innerHTML = '<div class="empty">Сигналов пока нет.</div>';
      return;
    }
    historyEl.innerHTML = items.map((item) => {
      const time = new Date(item.createdAt).toLocaleString("ru-RU");
      const dir = item.signal === "BUY" ? "КУПИТЬ" : "ПРОДАТЬ";
      return `
        <div class="history-item">
          <div class="history-top">
            <span>${item.instrument} • ${item.timeframe}</span>
            <span>${time}</span>
          </div>
          <div class="badge"><span class="dot ${item.signal === "SELL" ? "down" : ""}"></span>Сигнал: ${dir} | Точность: ${item.accuracy}%</div>
        </div>
      `;
    }).join("");
  }

  function loadHistory() {
    const raw = localStorage.getItem(historyStorageKey);
    const items = raw ? JSON.parse(raw) : [];
    renderHistory(items);
  }

  getSignalBtn.addEventListener("click", () => {
    const pair = selectedValue(pairSelect);
    const expiry = selectedValue(expirySelect);
    if (!pair || !expiry) return;

    statusEl.textContent = "AI АНАЛИЗИРУЕТ";
    resultEl.classList.remove("show");
    partnerWrapEl.style.display = "none";
    signalCardEl.style.display = "none";
    metricsEl.innerHTML = "";
    confidenceBar.style.width = "0%";
    reasoningEl.textContent = "";

    const finalAccuracy = Math.floor(75 + Math.random() * 26);
    const power = Math.floor(80 + Math.random() * 21);
    const volume = Math.floor(40 + Math.random() * 61);
    const precision = Math.floor(75 + Math.random() * 26);
    const signalType = Math.random() < 0.5 ? "BUY" : "SELL";
    const signalText = signalType === "BUY" ? "СИГНАЛ: КУПИТЬ" : "СИГНАЛ: ПРОДАТЬ";
    const signalClass = signalType === "BUY" ? "up" : "down";

    let progress = 0;
    const ticker = setInterval(() => {
      const step = Math.floor(5 + Math.random() * 14);
      progress = Math.min(100, progress + step);
      confidenceBar.style.width = `${progress}%`;
      statusEl.textContent = `AI АНАЛИЗИРУЕТ ${progress}%`;
      if (progress < 100) return;
      clearInterval(ticker);

      signalEl.textContent = signalText;
      signalEl.className = `signal ${signalClass}`;
      confidenceEl.textContent = `Точность сигнала: ${finalAccuracy}%`;
      reasoningEl.textContent = "AI анализ завершен";
      metricsEl.innerHTML = `
        <div>Сила актива: ${power}%</div>
        <div>Анализ объема: ${volume}%</div>
        <div>Точность сигнала: ${precision}%</div>
      `;
      signalCardEl.style.display = "flex";
      signalCardEl.innerHTML = `
        <div class="signal-badge ${signalType === "BUY" ? "buy" : "sell"}">
          <span class="icon">${signalType === "BUY" ? "↗" : "↘"}</span>
          <span>${signalType === "BUY" ? "КУПИТЬ" : "ПРОДАТЬ"}</span>
        </div>
      `;

      resultEl.classList.add("show");
      partnerWrapEl.style.display = "block";
      statusEl.textContent = "AI анализ завершен";
      partnerLinkEl.href = "https://pocketoption.com";

      const existing = JSON.parse(localStorage.getItem(historyStorageKey) || "[]");
      existing.push({
        instrument: pair,
        timeframe: expiry,
        signal: signalType,
        accuracy: finalAccuracy,
        createdAt: new Date().toISOString(),
      });
      localStorage.setItem(historyStorageKey, JSON.stringify(existing.slice(-30)));
      loadHistory();
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
    }, 180);
  });

  // Matrix background animation
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");
  const glyphs = "01アイウエオカキクケコサシスセソ1234567890BTCUSDT▲▼";
  let columns = [];
  const fontSize = 14;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = Math.floor(canvas.width / fontSize);
    columns = new Array(count).fill(0).map(() => Math.random() * canvas.height / fontSize);
  }

  function draw() {
    ctx.fillStyle = "rgba(4, 9, 10, 0.09)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = `${fontSize}px monospace`;

    for (let i = 0; i < columns.length; i++) {
      const text = glyphs[Math.floor(Math.random() * glyphs.length)];
      const x = i * fontSize;
      const y = columns[i] * fontSize;
      const g = 120 + Math.floor(Math.random() * 120);
      ctx.fillStyle = `rgb(35, ${g}, 95)`;
      ctx.fillText(text, x, y);
      if (y > canvas.height && Math.random() > 0.975) columns[i] = 0;
      columns[i] += 1;
    }
  }

  window.addEventListener("resize", resize);
  resize();
  setInterval(draw, 40);
  loadHistory();

  const introOverlay = document.getElementById("introOverlay");
  const introStart = document.getElementById("introStart");
  const mainScreen = document.getElementById("mainScreen");

  function hideIntro() {
    if (!introOverlay || introOverlay.classList.contains("hidden")) return;
    introOverlay.classList.add("hidden");
    canvas.classList.remove("blurred");
    mainScreen.classList.remove("blurred");
    setTimeout(() => {
      if (introOverlay.parentNode) introOverlay.parentNode.removeChild(introOverlay);
    }, 380);
  }

  function showIntro() {
    canvas.classList.add("blurred");
    mainScreen.classList.add("blurred");
    introOverlay.classList.remove("hidden");
  }
  showIntro();

  introStart.addEventListener("click", () => {
    hideIntro();
    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
  });
</script>
</body>
</html>
