<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Trade Analyzer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./config.js"></script>
  <style>
    :root {
      --bg: #020505;
      --glass: rgba(0, 0, 0, 0.6);
      --line: rgba(58, 255, 142, 0.4);
      --line-soft: rgba(86, 104, 96, 0.35);
      --text: #eafff2;
      --muted: #98aa9f;
      --neon: #43ff9f;
      --neon-soft: rgba(67, 255, 159, 0.3);
      --danger: #ff617f;
      --ok: #35e386;
      --hud-dark: rgba(5, 11, 9, 0.7);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    #matrix {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.25;
    }

    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: min(760px, 100%);
      background: var(--glass);
      border: 1px solid var(--line-soft);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      padding: 18px;
    }

    .head {
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: 27px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.2), 0 0 16px rgba(67, 255, 159, 0.18);
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.35px;
      text-transform: uppercase;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab-btn {
      border: 1px solid var(--line-soft);
      color: var(--text);
      background: var(--hud-dark);
      border-radius: 12px;
      height: 42px;
      cursor: pointer;
      font-weight: 700;
      transition: all .22s ease;
      letter-spacing: .25px;
    }

    .tab-btn:hover {
      box-shadow: inset 0 0 20px var(--neon-soft), 0 0 10px rgba(60, 255, 151, 0.22);
      border-color: var(--line);
    }

    .tab-btn.active {
      background: linear-gradient(90deg, rgba(20, 52, 36, 0.84), rgba(17, 56, 35, 0.84));
      border-color: var(--line);
      box-shadow: inset 0 0 24px var(--neon-soft);
    }

    .panel {
      display: none;
      border: 1px solid var(--line-soft);
      border-radius: 15px;
      background: rgba(7, 12, 10, 0.68);
      backdrop-filter: blur(12px);
      padding: 14px;
    }
    .panel.active { display: block; animation: panelIn .28s ease; }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #8ea89a;
      margin-bottom: 4px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    .ios-select {
      position: relative;
    }
    .ios-select-trigger {
      width: 100%;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(18, 24, 22, 0.92), rgba(10, 16, 14, 0.92));
      color: var(--text);
      padding: 0 38px 0 12px;
      outline: none;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      transition: border-color .2s ease, box-shadow .2s ease, transform .18s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), inset 0 -1px 0 rgba(0, 0, 0, 0.35);
    }
    .ios-select-trigger::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 50%;
      width: 8px;
      height: 8px;
      border-right: 2px solid #9fd8b8;
      border-bottom: 2px solid #9fd8b8;
      transform: translateY(-60%) rotate(45deg);
      transition: transform .24s ease;
      pointer-events: none;
    }
    .ios-select.open .ios-select-trigger {
      border-color: var(--line);
      box-shadow: 0 0 0 3px rgba(67, 255, 159, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }
    .ios-select.open .ios-select-trigger::after {
      transform: translateY(-25%) rotate(-135deg);
    }
    .ios-select-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: rgba(14, 20, 18, 0.98);
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.42);
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
      pointer-events: none;
      transition: opacity .24s ease, transform .24s ease;
      z-index: 10;
    }
    .ios-select.open .ios-select-menu {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .ios-option {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: transparent;
      color: #eafff2;
      text-align: left;
      padding: 11px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s ease, color .18s ease;
    }
    .ios-option:last-child { border-bottom: 0; }
    .ios-option:hover {
      background: rgba(67, 255, 159, 0.18);
      color: #f4fff8;
    }

    .upload-wrap {
      display: none;
      margin-top: 8px;
      animation: panelIn .25s ease;
    }

    .upload-btn {
      width: 100%;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      height: 42px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: .25px;
      cursor: pointer;
      background: var(--hud-dark);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      transition: all .22s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .upload-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,.24), transparent 80%);
      transform: translateX(-130%);
      animation: shimmer 2.4s linear infinite;
      pointer-events: none;
    }

    .upload-btn:hover {
      box-shadow: inset 0 0 20px var(--neon-soft), 0 0 10px rgba(60, 255, 151, 0.22);
      border-color: var(--line);
    }
    .upload-btn:active {
      transform: translateY(1px);
    }

    @keyframes shimmer {
      to { transform: translateX(130%); }
    }

    input[type="file"] { display: none; }

    .status {
      margin-top: 10px;
      min-height: 22px;
      color: #79f3b5;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
    }

    .result {
      margin-top: 12px;
      display: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.4);
      padding: 12px;
    }
    .result.show { display: block; animation: panelIn .25s ease; }

    .signal {
      margin: 0;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: .25px;
    }
    .signal.up { color: var(--ok); text-shadow: 0 0 16px rgba(53, 227, 134, 0.4); }
    .signal.down { color: var(--danger); text-shadow: 0 0 16px rgba(255, 97, 127, 0.35); }

    .confidence { margin: 8px 0 6px; font-size: 20px; font-weight: 800; }
    .progress {
      margin: 8px 0 9px;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(67, 255, 159, 0.25);
      overflow: hidden;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1d8d57, #42ff9f);
      box-shadow: 0 0 12px rgba(67, 255, 159, 0.42);
      transition: width .45s ease;
    }
    .reasoning { margin: 0; color: #bdd8c8; line-height: 1.45; }

    .partner {
      margin-top: 12px;
      display: none;
      text-align: center;
    }
    .partner a {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      border-radius: 12px;
      padding: 0 16px;
      line-height: 42px;
      border: 1px solid var(--line-soft);
      background: var(--hud-dark);
      transition: all .22s ease;
    }
    .partner a:hover {
      box-shadow: inset 0 0 20px var(--neon-soft), 0 0 10px rgba(60, 255, 151, 0.22);
      border-color: var(--line);
    }

    .profile-box {
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.34);
      padding: 12px;
      margin-bottom: 10px;
    }

    .nick {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }
    .meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .history-title {
      margin: 10px 0 8px;
      font-size: 15px;
      font-weight: 800;
      color: #c7f7dc;
    }

    .history {
      max-height: 320px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      background: rgba(7, 16, 12, 0.55);
      padding: 9px 10px;
      font-size: 13px;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #dffff0;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #43ff9f;
      box-shadow: 0 0 10px rgba(67, 255, 159, 0.6);
    }
    .dot.down {
      background: #ff617f;
      box-shadow: 0 0 10px rgba(255, 97, 127, 0.5);
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
<canvas id="matrix"></canvas>

<div class="screen">
  <div class="app">
    <div class="head">
      <h1 class="title">Matrix Trade Analyzer</h1>
      <p class="subtitle">AI анализ завершен</p>
    </div>

    <div class="tabs">
      <button id="tabAnalyze" class="tab-btn active" type="button">Анализ скриншота</button>
      <button id="tabProfile" class="tab-btn" type="button">Профиль</button>
    </div>

    <section id="analyzePanel" class="panel active">
      <div class="grid-2">
        <div>
          <label for="pairSelect">Валютная пара</label>
          <div class="ios-select" id="pairSelect">
            <button class="ios-select-trigger" type="button" data-value="">Выберите</button>
            <div class="ios-select-menu">
              <button class="ios-option" type="button" data-value="EUR/USD">EUR/USD</button>
            </div>
          </div>
        </div>
        <div>
          <label for="expirySelect">Время экспирации</label>
          <div class="ios-select" id="expirySelect">
            <button class="ios-select-trigger" type="button" data-value="">Выберите</button>
            <div class="ios-select-menu">
              <button class="ios-option" type="button" data-value="10 секунд">10 секунд</button>
              <button class="ios-option" type="button" data-value="1 минута">1 минута</button>
              <button class="ios-option" type="button" data-value="5 минут">5 минут</button>
              <button class="ios-option" type="button" data-value="10 минут">10 минут</button>
            </div>
          </div>
        </div>
      </div>

      <div id="uploadWrap" class="upload-wrap">
        <label class="upload-btn" for="imageInput">Загрузить скриншот</label>
      </div>
      <input id="imageInput" type="file" accept="image/*">

      <div id="status" class="status"></div>

      <div id="result" class="result">
        <p id="signal" class="signal">—</p>
        <p id="confidence" class="confidence"></p>
        <div class="progress"><div id="confidenceBar"></div></div>
        <p id="reasoning" class="reasoning"></p>
      </div>

      <div id="partner" class="partner">
        <a id="partnerLink" href="#" target="_blank" rel="noopener noreferrer">Открыть Pocket Option</a>
      </div>
    </section>

    <section id="profilePanel" class="panel">
      <div class="profile-box">
        <p id="profileNick" class="nick">@trader</p>
        <p id="profileMeta" class="meta">История последних сигналов</p>
      </div>
      <div class="history-title">История сигналов</div>
      <div id="history" class="history"></div>
    </section>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.expand();
    tg.ready();
    tg.setHeaderColor("#04090a");
    tg.setBackgroundColor("#04090a");
  }

  const CONFIG_API_BASE = window.APP_CONFIG?.API_BASE || "";
  const API_BASE = window.location.hostname === "localhost"
    ? "http://localhost:8000"
    : (CONFIG_API_BASE && !CONFIG_API_BASE.includes("REPLACE_WITH_YOUR_BACKEND_URL")
      ? CONFIG_API_BASE
      : "http://127.0.0.1:8000");

  const currentUser = tg?.initDataUnsafe?.user || {};
  const userId = String(currentUser.id || "anonymous");
  const username = currentUser.username ? `@${currentUser.username}` : (currentUser.first_name || "Trader");

  const tabAnalyze = document.getElementById("tabAnalyze");
  const tabProfile = document.getElementById("tabProfile");
  const analyzePanel = document.getElementById("analyzePanel");
  const profilePanel = document.getElementById("profilePanel");

  const pairSelect = document.getElementById("pairSelect");
  const expirySelect = document.getElementById("expirySelect");
  const pairTrigger = pairSelect.querySelector(".ios-select-trigger");
  const expiryTrigger = expirySelect.querySelector(".ios-select-trigger");
  const uploadWrap = document.getElementById("uploadWrap");
  const imageInput = document.getElementById("imageInput");

  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const signalEl = document.getElementById("signal");
  const confidenceEl = document.getElementById("confidence");
  const reasoningEl = document.getElementById("reasoning");
  const confidenceBar = document.getElementById("confidenceBar");
  const partnerWrapEl = document.getElementById("partner");
  const partnerLinkEl = document.getElementById("partnerLink");

  const profileNick = document.getElementById("profileNick");
  const historyEl = document.getElementById("history");
  profileNick.textContent = username;

  function switchTab(isProfile) {
    tabAnalyze.classList.toggle("active", !isProfile);
    tabProfile.classList.toggle("active", isProfile);
    analyzePanel.classList.toggle("active", !isProfile);
    profilePanel.classList.toggle("active", isProfile);
    if (isProfile) loadHistory();
  }

  tabAnalyze.addEventListener("click", () => switchTab(false));
  tabProfile.addEventListener("click", () => switchTab(true));

  function selectedValue(selectEl) {
    return selectEl.querySelector(".ios-select-trigger").dataset.value || "";
  }

  function closeAllSelects() {
    document.querySelectorAll(".ios-select.open").forEach((el) => el.classList.remove("open"));
  }

  function setupCustomSelect(selectEl) {
    const trigger = selectEl.querySelector(".ios-select-trigger");
    const options = selectEl.querySelectorAll(".ios-option");
    trigger.addEventListener("click", () => {
      const willOpen = !selectEl.classList.contains("open");
      closeAllSelects();
      if (willOpen) selectEl.classList.add("open");
    });
    options.forEach((opt) => {
      opt.addEventListener("click", () => {
        trigger.dataset.value = opt.dataset.value;
        trigger.textContent = opt.dataset.value;
        selectEl.classList.remove("open");
        updateUploadVisibility();
      });
    });
  }

  function updateUploadVisibility() {
    const ready = selectedValue(pairSelect) && selectedValue(expirySelect);
    uploadWrap.style.display = ready ? "block" : "none";
  }
  setupCustomSelect(pairSelect);
  setupCustomSelect(expirySelect);
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".ios-select")) closeAllSelects();
  });
  updateUploadVisibility();

  function renderHistory(items) {
    if (!items || items.length === 0) {
      historyEl.innerHTML = '<div class="empty">Сигналов пока нет.</div>';
      return;
    }
    historyEl.innerHTML = items.map((item) => {
      const time = new Date(item.created_at).toLocaleString("ru-RU");
      const dir = item.direction === "UP" ? "ВВЕРХ" : "ВНИЗ";
      return `
        <div class="history-item">
          <div class="history-top">
            <span>${item.pair} • ${item.expiry}</span>
            <span>${time}</span>
          </div>
          <div class="badge"><span class="dot ${item.direction === "DOWN" ? "down" : ""}"></span>Сигнал: ${dir} | ${item.confidence}%</div>
        </div>
      `;
    }).join("");
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${API_BASE}/history/${encodeURIComponent(userId)}`);
      const data = await res.json();
      renderHistory(data.items || []);
    } catch {
      historyEl.innerHTML = '<div class="empty">Не удалось загрузить историю.</div>';
    }
  }

  imageInput.addEventListener("change", async (event) => {
    const file = event.target.files?.[0];
    if (!file) return;

    const pair = selectedValue(pairSelect);
    const expiry = selectedValue(expirySelect);
    if (!pair || !expiry) return;

    statusEl.textContent = "AI ANALYZING MARKET DATA.";
    resultEl.classList.remove("show");
    partnerWrapEl.style.display = "none";

    let step = 0;
    const ticker = setInterval(() => {
      step += 1;
      statusEl.textContent = `AI ANALYZING MARKET DATA${".".repeat((step % 3) + 1)}`;
    }, 320);

    const formData = new FormData();
    formData.append("file", file);
    formData.append("user_id", userId);
    formData.append("username", username);
    formData.append("pair", pair);
    formData.append("expiry", expiry);

    try {
      const response = await fetch(`${API_BASE}/analyze`, { method: "POST", body: formData });
      const data = await response.json();
      if (!response.ok) throw new Error(data.detail || "Ошибка анализа");

      const isUp = data.direction === "UP";
      signalEl.textContent = isUp ? "СИГНАЛ: ВВЕРХ" : "СИГНАЛ: ВНИЗ";
      signalEl.className = `signal ${isUp ? "up" : "down"}`;
      confidenceEl.textContent = `ПРОЦЕНТ ЗАХОДА СДЕЛКИ: ${data.confidence}%`;
      confidenceBar.style.width = `${Math.max(0, Math.min(100, Number(data.confidence) || 0))}%`;
      reasoningEl.textContent = data.reasoning || "AI анализ завершен";
      partnerLinkEl.href = data.partner_link || "https://pocketoption.com";

      resultEl.classList.add("show");
      partnerWrapEl.style.display = "block";
      statusEl.textContent = "AI анализ завершен";
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
    } catch (error) {
      statusEl.textContent = `Ошибка: ${error.message}`;
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
    } finally {
      clearInterval(ticker);
      imageInput.value = "";
      loadHistory();
    }
  });

  // Matrix background animation
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");
  const glyphs = "01アイウエオカキクケコサシスセソ1234567890BTCUSDT▲▼";
  let columns = [];
  const fontSize = 14;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = Math.floor(canvas.width / fontSize);
    columns = new Array(count).fill(0).map(() => Math.random() * canvas.height / fontSize);
  }

  function draw() {
    ctx.fillStyle = "rgba(4, 9, 10, 0.09)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = `${fontSize}px monospace`;

    for (let i = 0; i < columns.length; i++) {
      const text = glyphs[Math.floor(Math.random() * glyphs.length)];
      const x = i * fontSize;
      const y = columns[i] * fontSize;
      const g = 120 + Math.floor(Math.random() * 120);
      ctx.fillStyle = `rgb(35, ${g}, 95)`;
      ctx.fillText(text, x, y);
      if (y > canvas.height && Math.random() > 0.975) columns[i] = 0;
      columns[i] += 1;
    }
  }

  window.addEventListener("resize", resize);
  resize();
  setInterval(draw, 40);
  loadHistory();
</script>
</body>
</html>
