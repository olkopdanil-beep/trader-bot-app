services:
  - type: web
    name: trader-bot-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PARTNER_LINK
        value: https://pocketoption.com
      - key: CORS_ORIGINS
        value: https://REPLACE_WITH_YOUR_GITHUB_PAGES_URL

  - type: worker
    name: trader-bot-telegram-worker
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        value: https://REPLACE_WITH_YOUR_GITHUB_PAGES_URL
